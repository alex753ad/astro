[pytest]
markers =
    integration: requires Swiss Ephemeris data files (EPHE_PATH)
    load: load/stress tests (slow, run separately)
    unit: fast unit tests without external dependencies

# По умолчанию пропускаем нагрузочные тесты
addopts = -v --tb=short -m "not load"

# Таймаут для отдельного теста (требует pytest-timeout)
# timeout = 30