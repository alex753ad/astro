name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # 1. Backend tests
  # ─────────────────────────────────────────────
  test-backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: astro
          POSTGRES_PASSWORD: astro
          POSTGRES_DB: astro_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U astro -d astro_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://astro:astro@localhost:5432/astro_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: test-secret-for-ci
      EPHE_PATH: data/ephe
      # AI ключи не нужны — integration тесты отмечены @pytest.mark.integration и пропускаются
      OPENAI_API_KEY: ""
      STRIPE_SECRET_KEY: ""
      STRIPE_WEBHOOK_SECRET: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests (no ephe files needed)
        run: pytest backend/tests/ -v -m "not integration" --tb=short --ignore=backend/tests/test_payments.py --ignore=backend/tests/test_validation.py

  # ─────────────────────────────────────────────
  # 2. Frontend lint + build
  # ─────────────────────────────────────────────
  test-frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

  # ─────────────────────────────────────────────
  # 3. Deploy to Railway (только main ветка)
  # ─────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service api --detach

      - name: Run Alembic migrations
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway run --service api alembic upgrade head
